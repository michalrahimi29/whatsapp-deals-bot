services:
  - type: web
    name: deals-bot
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_data.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "0"
    plan: free
